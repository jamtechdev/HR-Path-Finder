# Nginx config for bettercompany.info — copy to /etc/nginx/sites-available/hr-path-finder
# Then: sudo ln -sf /etc/nginx/sites-available/hr-path-finder /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
# For HTTPS: sudo certbot --nginx -d bettercompany.info -d www.bettercompany.info

server {
    listen 80;
    listen [::]:80;
    server_name bettercompany.info www.bettercompany.info;
    root /var/www/HR-Path-Finder/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        # Use php8.1-fpm.sock or php8.3-fpm.sock if your PHP version differs
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTPS $http_x_forwarded_proto;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
